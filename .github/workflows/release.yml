name: Release

# Triggered by pushing a version tag (e.g. v0.2.0). The tagged commit must
# already carry the matching version (see `make release VERSION=x.y.z`).
#
# The `android` job builds and attaches an Android APK. To ship an upgradeable,
# release-signed APK (so users can update in place), add these repository
# secrets (Settings → Secrets and variables → Actions):
#   ANDROID_KEYSTORE_BASE64   base64 of your release keystore (.jks)
#   ANDROID_KEYSTORE_PASSWORD keystore password
#   ANDROID_KEY_ALIAS         key alias
#   ANDROID_KEY_PASSWORD      key password
# Create a keystore once with:
#   keytool -genkey -v -keystore financy.jks -alias financy \
#           -keyalg RSA -keysize 2048 -validity 10000
#   base64 -w0 financy.jks    # value for ANDROID_KEYSTORE_BASE64
# Without the secrets the job still runs, producing a DEBUG-signed APK (fine for
# sideloading/testing, but not upgradeable across releases).
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
          - os: windows-latest
            target: windows
          - os: macos-latest
            target: darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Fyne build dependencies (Linux)
        if: matrix.target == 'linux'
        run: sudo apt-get update && sudo apt-get install -y gcc pkg-config libgl1-mesa-dev xorg-dev

      - name: Install the fyne CLI
        run: go install fyne.io/fyne/v2/cmd/fyne@latest

      - name: Install the nfpm CLI (Linux)
        if: matrix.target == 'linux'
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest

      - name: Package for ${{ matrix.target }}
        shell: bash
        run: |
          export PATH="$PATH:$(go env GOPATH)/bin"
          fyne package -os ${{ matrix.target }}

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p dist
          case "${{ matrix.target }}" in
            linux)   mv Financy.tar.xz dist/Financy-${{ github.ref_name }}-linux-amd64.tar.xz ;;
            windows) mv Financy.exe    dist/Financy-${{ github.ref_name }}-windows-amd64.exe ;;
            darwin)  zip -r            dist/Financy-${{ github.ref_name }}-macos.zip Financy.app ;;
          esac

      - name: Build .deb and .rpm (Linux)
        if: matrix.target == 'linux'
        shell: bash
        run: |
          export PATH="$PATH:$(go env GOPATH)/bin"
          # Build a version-stamped binary, then package it with nfpm. Strip the
          # leading "v" from the tag so package versions are valid semver.
          version="${GITHUB_REF_NAME#v}"
          make build VERSION="$version"
          VERSION="$version" nfpm package --config nfpm.yaml --packager deb --target dist/
          VERSION="$version" nfpm package --config nfpm.yaml --packager rpm --target dist/
          # Normalise asset names to match the other release bundles. nfpm adds an
          # rpm release number (financy-<ver>-1.x86_64.rpm), so glob the names.
          mv dist/financy_*_amd64.deb   dist/Financy-${{ github.ref_name }}-linux-amd64.deb
          mv dist/financy-*.x86_64.rpm  dist/Financy-${{ github.ref_name }}-linux-x86_64.rpm

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Financy ${{ github.ref_name }}
          body_path: docs/release-notes-${{ github.ref_name }}.md
          files: dist/*

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up the Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK, platform and build-tools
        run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" "ndk;27.2.12479018"

      - name: Install the fyne CLI
        run: go install fyne.io/tools/cmd/fyne@latest

      - name: Build the APK, then release-sign it
        shell: bash
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          export PATH="$PATH:$(go env GOPATH)/bin"
          export ANDROID_NDK_HOME="$ANDROID_HOME/ndk/27.2.12479018"
          # 16 KB-aligned load segments (Android 15+ / Play requirement).
          export CGO_LDFLAGS="-Wl,-z,max-page-size=16384,-z,common-page-size=16384"

          # fyne package builds a zipaligned APK (debug-signed by default).
          # (`fyne release` builds an AAB and needs bundletool — not what we want
          # for a sideloadable GitHub Release asset.)
          fyne package -os android/arm64 -app-id app.financy -icon Icon.png

          apksigner="$ANDROID_HOME/build-tools/34.0.0/apksigner"
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > release.jks
            # Re-sign with the release key so users can upgrade in place.
            "$apksigner" sign \
              --ks release.jks --ks-pass "pass:$KS_PASS" \
              --ks-key-alias "$KEY_ALIAS" --key-pass "pass:$KEY_PASS" \
              Financy.apk
            "$apksigner" verify Financy.apk && echo "APK signature verified"
          else
            echo "::warning::No ANDROID_KEYSTORE_BASE64 secret — shipping the debug-signed APK (fine for sideloading, but each build uses a different key, so users can't upgrade in place)."
          fi

          mkdir -p dist
          mv Financy.apk "dist/Financy-${GITHUB_REF_NAME}-android-arm64.apk"

      - name: Attach APK to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.apk

  ios:
    # iOS builds need Apple's toolchain (Xcode), so this must run on a macOS
    # runner. We build an UNSIGNED app bundle — no Apple Developer certificate or
    # provisioning profile required. `fyne package` produces an unsigned .app
    # (signing is a separate `fyne release` step, which we deliberately skip).
    #
    # The resulting .ipa is NOT installable as-is: iOS requires code signing to
    # run on a device. Sideload it by re-signing with a free Apple ID using a
    # tool like Sideloadly (https://sideloadly.io) or AltStore
    # (https://altstore.io). Free-provisioning signatures expire after 7 days, so
    # you'll need to re-sign/reinstall roughly weekly.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install the fyne CLI
        run: go install fyne.io/tools/cmd/fyne@latest

      - name: Build the unsigned iOS app bundle
        shell: bash
        run: |
          export PATH="$PATH:$(go env GOPATH)/bin"
          # Unsigned .app bundle for arm64 devices (no certificate needed).
          fyne package -os ios -app-id app.financy -icon Icon.png

          # Wrap the .app in the standard Payload/ layout and zip it into an
          # .ipa so sideloading tools (Sideloadly, AltStore) can re-sign it.
          mkdir -p Payload
          mv Financy.app Payload/
          mkdir -p dist
          zip -r "dist/Financy-${GITHUB_REF_NAME}-ios-arm64-unsigned.ipa" Payload
          echo "::warning::iOS .ipa is UNSIGNED. Re-sign it with a free Apple ID via Sideloadly or AltStore before installing on a device."

      - name: Attach the unsigned .ipa to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.ipa
