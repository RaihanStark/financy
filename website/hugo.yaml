# Financy documentation site (Hugo + Hextra), deployed under /financy/docs/.
baseURL: "https://raihanstark.github.io/financy/docs/"
title: Financy Docs

module:
  imports:
    - path: github.com/imfing/hextra

enableInlineShortcodes: true
enableGitInfo: false

# Docs site — no blog-style taxonomies (avoids stray /tags/ and /categories/).
disableKinds: [taxonomy, term]

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

menu:
  main:
    - name: Documentation
      pageRef: /
      weight: 1
    - name: Search
      weight: 2
      params:
        type: search
    - name: GitHub ↗
      url: "https://github.com/raihanstark/financy"
      weight: 3
    - name: ← Financy
      url: "https://raihanstark.github.io/financy/"
      weight: 4

params:
  navbar:
    displayTitle: true
    displayLogo: false
  footer:
    displayCopyright: true
    displayPoweredBy: false
  editURL:
    enable: false
  theme:
    default: system
    displayToggle: true
